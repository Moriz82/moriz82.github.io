name: Build Site

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'templates/**'
      - 'data/**'
      - 'assets/**'
      - 'scripts/build.js'
      - 'package.json'
      - '.github/workflows/build-site.yml'
  workflow_dispatch:

concurrency:
  group: build-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci || npm install

      - name: Build
        run: node scripts/build.js

      - name: Commit generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html about.html contact.html writeups/ projects/ posts/*.html assets/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: regenerate site from markdown"
            git push
          fi
